<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; }
</style>
</head>
<body>
<svg width="100%" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="400%" y2="0%">
      <stop offset="0%" stop-color="#66ffcc" />
      <stop offset="20%" stop-color="#33ccaa" />
      <stop offset="40%" stop-color="#7b68ee" />
      <stop offset="60%" stop-color="#a855f7" />
      <stop offset="80%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2dd4bf" />
      <stop offset="120%" stop-color="#66ffcc" />
    </linearGradient>
  </defs>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        fill="none" stroke="url(#auroraGrad)" stroke-width="6"
        font-family="Bree Serif, serif" font-size="100" font-weight="bold"
        style="filter: drop-shadow(0 0 8px rgba(102, 255, 204, 0.4));">
    TERVETULOA!
  </text>
  <animate xlink:href="#auroraGrad" attributeName="x1" values="0%; -200%; 0%" dur="8s" repeatCount="indefinite" />
  <animate xlink:href="#auroraGrad" attributeName="x2" values="400%; 200%; 400%" dur="8s" repeatCount="indefinite" />
</svg>
</body>
</html>
