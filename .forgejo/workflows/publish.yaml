# .forgejo/workflows/publish.yaml
# Codeberg Pages deployment workflow for jarilaru.fi.
# Kevyt versio: testit ja tarkistukset ajetaan paikallisesti, ei CI:ssä.

name: Build and Deploy to Codeberg Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  CODEBERG_ACTOR: LaruX
  CODEBERG_REPO: LaruX/www

jobs:
  build:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache API fallback data
        uses: actions/cache@v4
        with:
          path: .cache/api-fallback
          key: api-fallback-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            api-fallback-${{ runner.os }}-

      - name: Build site (Eleventy, no OG images)
        run: npm run build:no-og
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE }}

      - name: Build Pagefind search index
        run: npm run search:index

      - name: Prevent Jekyll processing
        run: touch _site/.nojekyll

      - name: Deploy to Codeberg Pages (pages branch)
        run: |
          cd _site
          git init -b pages
          git config user.name "Forgejo Actions"
          git config user.email "actions@noreply.codeberg.org"
          git add .
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ) [ci skip]"
          git push --force \
            "https://${CODEBERG_ACTOR}:${CODEBERG_TOKEN}@codeberg.org/${CODEBERG_REPO}.git" \
            pages:pages
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_PAGES_TOKEN }}
