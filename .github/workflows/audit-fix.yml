name: Auto-fix npm audit vulnerabilities
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  audit-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit fix
      - name: Commit fixes if package-lock.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet package-lock.json; then
            git add package-lock.json
            git commit -m "fix: auto-fix npm audit vulnerabilities"
            git push
          else
            echo "No vulnerabilities to fix."
          fi
