name: Build and Deploy
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: DISABLE_OG_IMAGES=true npx @11ty/eleventy
      - run: test -f _site/robots.txt
      - run: 'grep -q "User-agent: GPTBot" _site/robots.txt'
      - run: grep -q '<meta name="robots" content="index, follow, noai, noimageai">' _site/index.html
      - run: npx pagefind --site _site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.pages_url }}
    steps:
      - uses: actions/deploy-pages@v4
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify production status codes
        run: |
          for url in \
            https://www.jarilaru.fi/ \
            https://www.jarilaru.fi/en/ \
            https://www.jarilaru.fi/esitykset/ \
            https://www.jarilaru.fi/en/presentations/ \
            https://www.jarilaru.fi/robots.txt \
            https://www.jarilaru.fi/sitemap.xml; do
            code=$(curl -o /dev/null -s -w "%{http_code}" "$url")
            test "$code" = "200"
          done
      - name: Verify production robots.txt
        run: |
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/robots.txt | grep -q "User-agent: GPTBot"
      - name: Verify production robots meta
        run: |
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/ | grep -q '<meta name="robots" content="index, follow, noai, noimageai">'
      - name: Verify production SEO meta and alternates
        run: |
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/ > fi.html
          grep -q '<meta name="description" content="' fi.html
          grep -q '<link rel="canonical" href="https://www.jarilaru.fi/">' fi.html
          grep -q 'hreflang="fi"' fi.html
          grep -q 'hreflang="en"' fi.html
          grep -q 'hreflang="x-default"' fi.html
          grep -q '<meta property="og:image" content="https://www.jarilaru.fi/' fi.html
          ! grep -q '<meta property="og:image" content="https://www.jarilaru.fi/null">' fi.html
          ! grep -q '<meta property="og:image" content="null">' fi.html
          rm -f fi.html
      - name: Verify production sitemap contains key URLs
        run: |
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/sitemap.xml | grep -q '<loc>https://www.jarilaru.fi/esitykset/</loc>'
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/sitemap.xml | grep -q '<loc>https://www.jarilaru.fi/en/presentations/</loc>'
      - name: Verify production TOC on FI and EN presentations pages
        run: |
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/esitykset/ | grep -q 'href="#canva-heading"'
          curl -fsSL --retry 5 --retry-delay 5 https://www.jarilaru.fi/en/presentations/ | grep -q 'href="#canva-heading"'
