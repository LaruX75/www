name: Build and Deploy
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: DISABLE_OG_IMAGES=true npx @11ty/eleventy
      - run: test -f _site/robots.txt
      - run: 'grep -q "User-agent: GPTBot" _site/robots.txt'
      - run: grep -q '<meta name="robots" content="index, follow, noai, noimageai">' _site/index.html
      - run: npx pagefind --site _site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.pages_url }}
    steps:
      - uses: actions/deploy-pages@v4
