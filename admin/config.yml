backend:
  name: github
  repo: LaruX75/www
  branch: main
  base_url: https://sveltia-cms-auth.fc4ydtm5bs.workers.dev

local_backend: true
publish_mode: simple
media_folder: "src/img/uploads"
public_folder: "/img/uploads"
site_url: https://www.jarilaru.fi
display_url: https://www.jarilaru.fi
locale: "fi"

collections:
  - name: "blog"
    label: "Blogipostaukset"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Kuva", name: "thumbnail", widget: "image", required: false }
      - { label: "Kategoriat", name: "categories", widget: "list", required: false }
      - { label: "Avainsanat", name: "keywords", widget: "list", required: false }
      - { name: "wp_id", widget: "hidden", required: false }
      - { name: "templateEngineOverride", widget: "hidden", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  - name: "publications"
    label: "Julkaisut (mielipiteet, kolumnit, puheet, lausunnot)"
    folder: "src/publications"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title", "type"]
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Alaotsikko", name: "subtitle", widget: "string", required: false }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "Tyyppi"
        name: "type"
        widget: "select"
        options:
          - label: "Mielipidekirjoitus"
            value: "mielipide"
          - label: "Kolumni"
            value: "kolumni"
          - label: "Puhe / puheenvuoro"
            value: "puhe"
          - label: "Lausunto"
            value: "lausunto"
          - label: "Tieteellinen julkaisu"
            value: "tieteellinen"
          - label: "Esitelmä"
            value: "esitelma"
      - { label: "Julkaisupaikka/lehti", name: "publication", widget: "string", required: false, hint: "Esim. Lausuntopalvelu.fi tai Kaleva" }
      - { label: "Tapahtuma", name: "event", widget: "string", required: false, hint: "Puheen tai esitelmän tapahtuma, esim. Oulun kaupunginvaltuusto" }
      - { label: "Asiakohta", name: "asiakohta", widget: "string", required: false, hint: "Esim. § 83 – Info: Sivistysohjelma" }
      - label: "Foorumi (puhe)"
        name: "forum"
        widget: "list"
        required: false
        hint: "Vain puheille, esim. Kaupunginvaltuusto"
      - { label: "Lausuntopyynnnön diaarinumero", name: "diaryNumber", widget: "string", required: false, hint: "Esim. OPH-6433-2024 tai VN/31530/2023" }
      - label: "Lausuntokanava"
        name: "statementChannel"
        widget: "select"
        required: false
        options:
          - { label: "Lausuntopalvelu.fi", value: "lausuntopalvelu" }
          - { label: "Muu", value: "muu" }
      - { label: "Lausuntopyyntö (viranomainen)", name: "statementAuthority", widget: "string", required: false, hint: "Esim. Opetushallitus tai Valtioneuvosto" }
      - label: "Kirjoitusrooli"
        name: "writingRoles"
        widget: "select"
        required: false
        multiple: true
        options:
          - { label: "Asiantuntija (expert)", value: "expert" }
          - { label: "Poliittinen toimija", value: "political" }
          - { label: "Yhteisötoimija", value: "community" }
      - label: "Liittyvä projekti"
        name: "relatedProject"
        widget: "list"
        required: false
        hint: "Esim. Generation AI"
      - label: "Lisenssi"
        name: "license"
        widget: "select"
        required: false
        options:
          - { label: "CC BY 4.0", value: "CC-BY-4.0" }
          - { label: "CC BY-NC-ND 4.0", value: "CC-BY-NC-ND-4.0" }
          - { label: "Kaikki oikeudet pidätetään", value: "all-rights-reserved" }
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Linkki", name: "url", widget: "string", required: false }
      - label: "Kategoriat"
        name: "categories"
        widget: "list"
        required: false
      - label: "Toissijainen teema"
        name: "secondaryTheme"
        widget: "list"
        required: false
      - label: "Avainsanat"
        name: "keywords"
        widget: "list"
        required: false
      - { name: "wp_id", widget: "hidden", required: false }
      - { name: "templateEngineOverride", widget: "hidden", default: "md", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown", required: false }

  - name: "media"
    label: "Mediassa"
    folder: "src/media"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title", "mediaType"]
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - label: "Rooli"
        name: "mediaRole"
        widget: "select"
        options:
          - { label: "Juttu minusta", value: "about" }
          - { label: "Vieras / haastateltava", value: "guest" }
      - label: "Sisältötyyppi"
        name: "mediaType"
        widget: "select"
        options:
          - { label: "Lehtijuttu / artikkeli", value: "article" }
          - { label: "Podcast", value: "podcast" }
          - { label: "Video / YouTube", value: "video" }
          - { label: "Radiohaastattelu", value: "radio" }
          - { label: "Muu", value: "other" }
      - { label: "Media / julkaisija", name: "mediaOutlet", widget: "string", hint: "Esim. Rantapohja tai Think Open Digest / Tiederadio" }
      - { label: "Lähde-URL", name: "sourceUrl", widget: "string" }
      - { label: "Thumbnail-URL", name: "thumbnail", widget: "string", required: false, hint: "Haetaan automaattisesti lähdesivun OG-kuvasta jos jätetty tyhjäksi — tai lisää URL käsin" }
      - { label: "Järjestys", name: "mediaOrder", widget: "number", required: false, default: 50, hint: "Suurempi luku = korkeammalle listassa" }
      - label: "Kategoriat"
        name: "categories"
        widget: "list"
        required: false
        hint: "Esim. Mediassa, Haastattelut, Tekoäly"
      - label: "Avainsanat"
        name: "keywords"
        widget: "list"
        required: false
      - { label: "Sisältö", name: "body", widget: "markdown", required: false }

  - name: "politics"
    label: "Aloitteet ja adressit"
    folder: "src/politics"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "Tyyppi"
        name: "initiative_type"
        widget: "select"
        options:
          - label: "Valtuustoaloite"
            value: "valtuustoaloite"
          - label: "Adressi"
            value: "adressi"
          - label: "Kansalaisaloite"
            value: "kansalaisaloite"
          - label: "Muu"
            value: "muu"
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Linkki", name: "url", widget: "string", required: false }
      - { name: "wp_id", widget: "hidden", required: false }
      - { name: "templateEngineOverride", widget: "hidden", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown", required: false }

  - name: "training"
    label: "Koulutukset ja materiaalit"
    folder: "src/training"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - label: "Tyyppi"
        name: "training_type"
        widget: "select"
        options:
          - label: "Kurssi"
            value: "kurssi"
          - label: "Workshop"
            value: "workshop"
          - label: "Luento"
            value: "luento"
          - label: "Materiaali"
            value: "materiaali"
          - label: "Muu"
            value: "muu"
      - { label: "Kohderyhmä", name: "target_group", widget: "string", required: false }
      - { label: "Kesto", name: "duration", widget: "string", required: false }
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Järjestys", name: "order", widget: "number", required: false, default: 99 }
      - label: "Materiaalit"
        name: "materials"
        widget: "list"
        required: false
        fields:
          - { label: "Otsikko", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string", required: false }
          - { label: "Tyyppi", name: "type", widget: "string", required: false }
          - { label: "Kuvaus", name: "description", widget: "string", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  - name: "portfolio"
    label: "Portfolio"
    folder: "src/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Vuosi", name: "year", widget: "number" }
      - { label: "Kuvaus", name: "description", widget: "text", required: false }
      - { label: "Kuva", name: "thumbnail", widget: "image", required: false }
      - { label: "Projektin URL", name: "project_url", widget: "string", required: false }
      - { label: "Tagit", name: "tags", widget: "list", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Sivut"
    folder: "src/fi"
    create: true
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "page.njk" }
      - { label: "Alaotsikko", name: "subtitle", widget: "string", required: false }
      - { label: "Polku", name: "permalink", widget: "string", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  - name: "curated_researchfi"
    label: "Research.fi — piilotetut julkaisut"
    folder: "src/curated/researchfi"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "curated_slideshare"
    label: "SlideShare — piilotetut esitykset"
    folder: "src/curated/slideshare"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "curated_canva"
    label: "Canva — piilotetut esitykset"
    folder: "src/curated/canva"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "curated_finna"
    label: "AOE/Finna — piilotetut oppimateriaalit"
    folder: "src/curated/finna"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "curated_youtube"
    label: "YouTube — piilotetut soittolistat"
    folder: "src/curated/youtube"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "curated_theses"
    label: "Opinnäytetyöt — piilotetut"
    folder: "src/curated/theses"
    create: false
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "ID", name: "source_id", widget: "string" }
      - { label: "Piilotettu", name: "hidden", widget: "boolean", default: false }

  - name: "testimonials"
    label: "Palautteet"
    files:
      - file: "src/_data/testimonials.json"
        label: "Testimonials-osiot"
        name: "testimonials"
        fields:
          - name: "locales"
            label: "Osioiden tekstit"
            widget: "object"
            collapsed: true
            fields:
              - name: "fi"
                label: "Suomi"
                widget: "object"
                fields:
                  - { label: "Etusivun otsikko", name: "homeHeading", widget: "string" }
                  - { label: "Yrityssivun otsikko", name: "companyHeading", widget: "string" }
                  - { label: "Etusivun linkin teksti", name: "ctaLabel", widget: "string" }
                  - { label: "Etusivun linkin kohde", name: "ctaHref", widget: "string" }
              - name: "en"
                label: "English"
                widget: "object"
                fields:
                  - { label: "Homepage heading", name: "homeHeading", widget: "string" }
                  - { label: "Company page heading", name: "companyHeading", widget: "string" }
                  - { label: "Homepage link text", name: "ctaLabel", widget: "string" }
                  - { label: "Homepage link target", name: "ctaHref", widget: "string" }
          - name: "items"
            label: "Palautteet"
            label_singular: "Palaute"
            widget: "list"
            summary: "{{fields.content.fi.attribution}} — {{fields.content.fi.quote}}"
            minimize_collapsed: true
            fields:
              - { label: "Tunniste", name: "id", widget: "string", hint: "Yksilöllinen, muuttumaton tunniste, esimerkiksi oph-koulutus-2026." }
              - label: "Kategoria"
                name: "category"
                widget: "select"
                options:
                  - { label: "Koulutus", value: "training" }
                  - { label: "Puheenvuoro", value: "speaking" }
                  - { label: "Opetus", value: "teaching" }
              - label: "Näytetään sivuilla"
                name: "placements"
                widget: "select"
                multiple: true
                min: 1
                options:
                  - { label: "Etusivu", value: "home" }
                  - { label: "Yrityssivu", value: "company" }
                hint: "Etusivulla näytetään enintään kolme ensimmäistä etusivulle merkittyä palautetta."
              - { label: "Sisäinen lähdemerkintä", name: "source", widget: "string", required: false, default: "manual-admin-entry" }
              - label: "Julkaisulupa"
                name: "publicationStatus"
                widget: "select"
                options:
                  - { label: "Julkaisulupa varmistettu", value: "approved" }
                  - { label: "Julkaistu sivustolla aiemmin", value: "already-published" }
                hint: "Lisää vain palautteita, joiden julkaisemiseen on lupa tai jotka on jo julkaistu sivustolla."
              - name: "content"
                label: "Kieliversiot"
                widget: "object"
                fields:
                  - name: "fi"
                    label: "Suomi"
                    widget: "object"
                    fields:
                      - { label: "Lainaus", name: "quote", widget: "text" }
                      - { label: "Lähde näkyvällä sivulla", name: "attribution", widget: "string", hint: "Esimerkiksi OPH-koulutuksen osallistuja. Älä lisää henkilön nimeä ilman lupaa." }
                  - name: "en"
                    label: "English"
                    widget: "object"
                    fields:
                      - { label: "Quote", name: "quote", widget: "text" }
                      - { label: "Public attribution", name: "attribution", widget: "string" }

  - name: "site_data"
    label: "Sivuston data"
    files:
      - file: "src/_data/canva-links.json"
        label: "Canva-esitykset"
        name: "canva_links"
        fields:
          - label: "Canva julkiset jakolinkit"
            name: "designLinks"
            widget: "list"
            hint: "Lisää yksi julkinen Canva-linkki per rivi."
            field:
              label: "Julkinen linkki"
              name: "link"
              widget: "string"
          - label: "Skrollerissa näytettävien määrä"
            name: "tickerLimit"
            widget: "number"
            required: false
            min: 1
            default: 12
      - file: "src/_data/youtube-config.json"
        label: "YouTube-soittolistat"
        name: "youtube_config"
        fields:
          - { label: "YouTube profiililinkki", name: "profileUrl", widget: "string", required: false, hint: "Esim. https://www.youtube.com/jarilaru tai /@handle" }
          - { label: "Channel ID", name: "channelId", widget: "string", required: false, hint: "Tarkin tunniste, jos tiedossa (UC...)." }
          - { label: "Handle", name: "handle", widget: "string", required: false, hint: "Ilman @-merkkiä." }
          - { label: "Username", name: "username", widget: "string", required: false }
          - { label: "Hakufallback (channelQuery)", name: "channelQuery", widget: "string", required: false, default: "jarilaru" }
          - { label: "Skrollerissa näytettävien määrä", name: "tickerLimit", widget: "number", required: false, min: 1, default: 12 }
      - file: "src/_data/cv.json"
        label: "Ansioluettelo (CV-data)"
        name: "cv_data"
        fields:
          - name: fi
            label: "Suomi"
            widget: object
            fields:
              - { name: name, label: "Nimi (nimijärjestyksessä)", widget: string }
              - { name: degree, label: "Tutkinto (lyhyt)", widget: string }
              - { name: position, label: "Virka/toimi", widget: string }
              - { name: dept, label: "Tiedekunta/yksikkö", widget: string }
              - { name: institution, label: "Yliopisto/organisaatio", widget: string }
              - { name: birth, label: "Syntymäaika", widget: string }
              - { name: updated, label: "CV päivitetty", widget: string }
              - name: education
                label: "Koulutus ja tutkinnot"
                widget: list
                fields:
                  - { name: degree, label: "Tutkinto", widget: string }
                  - { name: field, label: "Ala", widget: string }
                  - { name: institution, label: "Yliopisto", widget: string }
                  - { name: year, label: "Valmistumispäivä", widget: string }
                  - { name: note, label: "Lisätiedot (esim. väitöskirjan nimi)", widget: string, required: false }
              - name: positions
                label: "Nykyiset virat ja toimet"
                widget: list
                fields:
                  - { name: title, label: "Nimike", widget: string }
                  - { name: note, label: "Lisätiedot", widget: string, required: false }
                  - { name: institution, label: "Organisaatio", widget: string }
                  - { name: dept, label: "Yksikkö", widget: string, required: false }
                  - { name: period, label: "Ajanjakso (esim. 2013–)", widget: string, required: false }
              - name: prev_positions
                label: "Aiemmat virat ja toimet"
                widget: list
                fields:
                  - { name: title, label: "Nimike", widget: string }
                  - { name: note, label: "Lisätiedot", widget: string, required: false }
                  - { name: institution, label: "Organisaatio", widget: string }
                  - { name: period, label: "Ajanjakso (esim. 2004–2012)", widget: string, required: false }
              - name: teaching
                label: "Opetus ja pedagogiikka"
                widget: list
                field:
                  name: item
                  label: "Kohta"
                  widget: string
              - name: other_roles
                label: "Muut tehtävät"
                widget: list
                fields:
                  - { name: role, label: "Tehtävä", widget: string }
                  - { name: institution, label: "Organisaatio", widget: string }
                  - { name: period, label: "Ajanjakso", widget: string, required: false }
                  - { name: note, label: "Lisätiedot", widget: string, required: false }
              - name: funding
                label: "Tutkimusrahoitus"
                widget: list
                fields:
                  - { name: project, label: "Projekti", widget: string }
                  - { name: funder, label: "Rahoittaja", widget: string }
                  - { name: period, label: "Ajanjakso", widget: string, required: false }
                  - { name: role, label: "Rooli hankkeessa", widget: string, required: false }
              - name: grants
                label: "Apurahat"
                widget: list
                fields:
                  - { name: year, label: "Vuosi", widget: string }
                  - { name: funder, label: "Myöntäjä", widget: string }
                  - { name: amount, label: "Summa", widget: string }
              - name: languages
                label: "Kielitaito"
                widget: list
                fields:
                  - { name: lang, label: "Kieli", widget: string }
                  - { name: level, label: "Taso", widget: string }
              - name: profiles
                label: "Tutkijaprofiilit"
                widget: list
                fields:
                  - { name: name, label: "Palvelun nimi", widget: string }
                  - { name: id, label: "Tunniste (esim. ORCID-numero)", widget: string, required: false }
                  - { name: url, label: "URL", widget: string, required: false }
          - name: en
            label: "English"
            widget: object
            fields:
              - { name: name, label: "Name (surname first)", widget: string }
              - { name: degree, label: "Degree (short)", widget: string }
              - { name: position, label: "Position/title", widget: string }
              - { name: dept, label: "Faculty/department", widget: string }
              - { name: institution, label: "University/organisation", widget: string }
              - { name: birth, label: "Date of birth", widget: string }
              - { name: updated, label: "CV updated", widget: string }
              - name: education
                label: "Education and qualifications"
                widget: list
                fields:
                  - { name: degree, label: "Degree", widget: string }
                  - { name: field, label: "Field", widget: string }
                  - { name: institution, label: "University", widget: string }
                  - { name: year, label: "Graduation date", widget: string }
                  - { name: note, label: "Details (e.g. dissertation title)", widget: string, required: false }
              - name: positions
                label: "Current positions"
                widget: list
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: note, label: "Details", widget: string, required: false }
                  - { name: institution, label: "Organisation", widget: string }
                  - { name: dept, label: "Department", widget: string, required: false }
                  - { name: period, label: "Period (e.g. 2013–)", widget: string, required: false }
              - name: prev_positions
                label: "Previous positions"
                widget: list
                fields:
                  - { name: title, label: "Title", widget: string }
                  - { name: note, label: "Details", widget: string, required: false }
                  - { name: institution, label: "Organisation", widget: string }
                  - { name: period, label: "Period (e.g. 2004–2012)", widget: string, required: false }
              - name: teaching
                label: "Teaching and pedagogy"
                widget: list
                field:
                  name: item
                  label: "Item"
                  widget: string
              - name: other_roles
                label: "Other roles"
                widget: list
                fields:
                  - { name: role, label: "Role", widget: string }
                  - { name: institution, label: "Organisation", widget: string }
