// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const opts = lang === 'fi'
    ? { day: 'numeric', month: 'numeric', year: 'numeric' }
    : { day: 'numeric', month: 'long', year: 'numeric' };
  return d.toLocaleDateString(lang === 'fi' ? 'fi-FI' : 'en-GB', opts);
}

function groupBy(arr, fn) {
  const map = new Map();
  for (const item of arr) {
    const key = fn(item);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return map;
}

      <div class="doc-row">
        <div class="doc-year" style="min-width:60px">${esc(p.period)}</div>
        <div>
          <strong>${esc(p.title)}</strong>${p.note ? ` — ${esc(p.note)}` : ''}
          <div class="doc-meta">${esc(p.institution)}</div>
        </div>
      </div>`).join('')}
  </div>

  <div class="doc-section">
    <h2>${esc(s.teaching)}</h2>
    <ul>${cv.teaching.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
  </div>

  <div class="doc-section">
    <h2>${esc(s.other_roles)}</h2>
    ${cv.other_roles.map(r => `
      <div class="doc-row">
        <div class="doc-year" style="min-width:60px">${esc(r.period)}</div>
        <div>
          <strong>${esc(r.role)}</strong>${r.note ? ` — ${esc(r.note)}` : ''}
          <div class="doc-meta">${esc(r.institution)}</div>
        </div>
      </div>`).join('')}
  </div>

  <div class="doc-section">
    <h2>${esc(s.funding)}</h2>
    ${cv.funding.map(f => `
      <div class="doc-row">
        <div class="doc-year" style="min-width:60px">${esc(f.period)}</div>
        <div>
          <strong>${esc(f.project)}</strong> — ${esc(f.role || '')}
          <div class="doc-meta">${esc(f.funder)}</div>
        </div>
      </div>`).join('')}
  </div>

  <div class="doc-section">
    <h2>${esc(s.grants)}</h2>
    ${cv.grants.map(g => `
      <div class="doc-row">
        <div class="doc-year">${esc(g.year)}</div>
        <div>${esc(g.funder)} <strong>${esc(g.amount)}</strong></div>
      </div>`).join('')}
  </div>

  <div class="doc-section">
    <h2>${esc(s.pub_summary)}</h2>
    <div class="stat-row">
      <div class="stat-item"><strong>${totalRf + countLocal}</strong>${esc(s.publications)} (${esc(s.total)})</div>
      ${countA ? `<div class="stat-item"><strong>${countA}</strong> A (${esc(s.peer_reviewed)})</div>` : ''}
      ${countB ? `<div class="stat-item"><strong>${countB}</strong> B</div>` : ''}
      ${countC ? `<div class="stat-item"><strong>${countC}</strong> C</div>` : ''}
      ${countD ? `<div class="stat-item"><strong>${countD}</strong> D</div>` : ''}
      ${countE ? `<div class="stat-item"><strong>${countE}</strong> E</div>` : ''}
      ${countG ? `<div class="stat-item"><strong>${countG}</strong> G</div>` : ''}
      ${countLocal ? `<div class="stat-item"><strong>${countLocal}</strong> ${lang === 'fi' ? 'mielipide/kolumni/puhe' : 'opinion/column/speech'}</div>` : ''}
    </div>
    ${recent.length ? `<p style="margin-top:6px;font-size:9pt">${lang === 'fi' ? 'Viimeisimmät julkaisut:' : 'Most recent publications:'}</p>
    ${recent.map(p => renderRef(p)).join('')}
    <p style="font-size:8.5pt;margin-top:4px;font-style:italic">${lang === 'fi' ? 'Täydellinen julkaisuluettelo erillisessä liitteessä (OKM-julkaisuluettelo).' : 'Full publication list in a separate document (OKM publication list).'}</p>` : ''}
  </div>

  <div class="doc-section">
    <h2>${esc(s.languages)}</h2>
    <ul>${cv.languages.map(l => `<li><strong>${esc(l.lang)}</strong>: ${esc(l.level)}</li>`).join('')}</ul>
  </div>

  <div class="doc-section">
    <h2>${esc(s.profiles)}</h2>
    <ul>${cv.profiles.map(p => `<li><strong>${esc(p.name)}</strong>${p.id ? `: ${esc(p.id)}` : ''}${p.url ? ` — <a href="${esc(p.url)}">${esc(p.url)}</a>` : ''}</li>`).join('')}</ul>
  </div>
  `;

  return html;
}

// ── Render publication reference ─────────────────────────────────────────────
function renderRef(p, showType = true) {
  const parts = [];
  if (p.authors) parts.push(`<span class="ref-authors">${esc(p.authors)}.</span>`);
  if (p.year) parts.push(`(${esc(p.year)}).`);
  if (p.title) parts.push(`<span class="ref-title">${esc(p.title)}.</span>`);
  let venue = '';
  if (p.journal) venue += esc(p.journal);
  if (p.volume) venue += `, ${esc(p.volume)}`;
  if (p.issue) venue += `(${esc(p.issue)})`;
  if (p.pages) venue += `, ${esc(p.pages)}`;
  if (p.publisher && !p.journal) venue += esc(p.publisher);
  if (venue) parts.push(`<span class="ref-venue">${venue}.</span>`);
  const badges = [];
  if (showType && p.typeCode) badges.push(`<span class="ref-type">[${esc(p.typeCode)}]</span>`);
  if (p.jufoLevel != null) badges.push(`<span class="jufo-badge">${esc(S[lang].jufo)} ${esc(p.jufoLevel)}</span>`);
  if (p.openAccess) badges.push(`<span class="oa-badge">OA</span>`);
  const doiHtml = p.doiUrl ? `<span class="ref-doi"><a href="${esc(p.doiUrl)}">${esc(p.doiUrl)}</a></span>` : (p.doi ? `<span class="ref-doi">${esc(p.doi)}</span>` : '');
  return `<div class="doc-ref">${parts.join(' ')} ${doiHtml} ${badges.join(' ')}</div>`;
}

function renderLocalRef(p) {
  const year = p.year || (p.date ? p.date.slice(0,4) : '');
  const parts = [`<span class="ref-authors">Laru, J.</span>`];
  if (year) parts.push(`(${esc(year)}).`);
  if (p.title) parts.push(`<span class="ref-title">${esc(p.title)}.</span>`);
  if (p.publication) parts.push(`<span class="ref-venue">${esc(p.publication)}.</span>`);
  if (p.event) parts.push(`<span class="ref-venue">${esc(p.event)}.</span>`);
  const doiHtml = p.url ? `<span class="ref-doi"><a href="${esc(p.url)}">${esc(p.url)}</a></span>` : '';
  return `<div class="doc-ref">${parts.join(' ')} ${doiHtml}</div>`;
}

// ── Render publication list (OKM) ─────────────────────────────────────────────
function renderPublist() {
  const s = S[lang];
  const rf = exportData?.researchfiPublications || [];
  const local = exportData?.localPublications || [];
  const now = new Date().toLocaleDateString(lang === 'fi' ? 'fi-FI' : 'en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const rfByType = groupBy(rf, p => p.typeCode || 'other');

  // Sort each group by year desc
  for (const [,arr] of rfByType) arr.sort((a,b) => (b.year||0)-(a.year||0));

  const localByType = groupBy(local, p => p.type || 'other');
  for (const [,arr] of localByType) arr.sort((a,b) => (b.year||a.year||0)-(a.year||b.year||0));

  const totalRf = rf.length;
  const totalLocal = local.length;

  function sectionBlock(heading, types, isRf = true) {
    const items = [];
    for (const tc of types) {
      const arr = (isRf ? rfByType : localByType).get(tc);
      if (!arr?.length) continue;
      const label = isRf ? (OKM_LABEL[lang][tc] || tc) : (s[`sec_${tc}`] || tc);
      items.push(`<div class="pub-type-label">${esc(label)} (${arr.length})</div>`);
      items.push(arr.map(p => isRf ? renderRef(p, false) : renderLocalRef(p)).join(''));
    }
    if (!items.length) return '';
    return `<div class="pub-section-group">
      <div class="pub-section-head">${esc(heading)}</div>
      ${items.join('')}
    </div>`;
  }

  let html = `
  <div class="doc-title">${esc(s.publist_title)}</div>
  <div class="doc-subtitle">${esc(s.publist_guideline)} &nbsp;|&nbsp; ${esc(s.generated)}: ${esc(now)}</div>
  <div class="doc-section" style="margin-bottom:12px">
    <div class="stat-row">
      <div class="stat-item"><strong>${totalRf + totalLocal}</strong> ${esc(s.publications)} (${esc(s.total)})</div>
      <div class="stat-item">${esc('Research.fi')}: <strong>${totalRf}</strong></div>
      <div class="stat-item">${lang==='fi'?'Muut julkaisut':'Other publications'}: <strong>${totalLocal}</strong></div>
    </div>
  </div>
  ${sectionBlock(s.sec_A, ['A1','A2','A3','A4'])}
  ${sectionBlock(s.sec_B, ['B1','B2','B3'])}
  ${sectionBlock(s.sec_C, ['C1','C2'])}
  ${sectionBlock(s.sec_D, ['D1','D2','D3'])}
  ${sectionBlock(s.sec_E, ['E1','E2'])}
  ${sectionBlock(s.sec_G, ['G4','G5'])}
  ${sectionBlock(s.sec_mielipide, ['mielipide'], false)}
  ${sectionBlock(s.sec_kolumni, ['kolumni'], false)}
  ${sectionBlock(s.sec_puhe, ['puhe'], false)}
  ${sectionBlock(s.sec_esitelma, ['esitelma'], false)}
  `;

  return html;
}

// ── Render to DOM ─────────────────────────────────────────────────────────────
function render() {
  if (!exportData) return;
  const inner = document.getElementById('preview-inner');
  inner.innerHTML = docType === 'cv' ? renderCV() : renderPublist();
  document.getElementById('print-btn').disabled = false;
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  setStatus(lang === 'fi' ? 'Ladataan julkaisutietoja…' : 'Loading publication data…');
  try {
    const r = await fetch('/api/export-data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    exportData = await r.json();
    const n = (exportData.researchfiPublications?.length || 0) + (exportData.localPublications?.length || 0);
    setStatus(lang === 'fi' ? `${n} julkaisua ladattu` : `${n} publications loaded`, 3000);
    render();
  } catch (err) {
    setStatus('Virhe: ' + err.message);
    document.getElementById('preview-inner').innerHTML = `<div class="loading-area text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${esc(err.message)}<br><small>Varmista että sivusto on builtattu (<code>npm run build:no-og</code>) ja palvelin ajaa.</small></div>`;
  }
}

function setStatus(msg, clearMs = 0) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  if (clearMs) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, clearMs);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('lang-fi').addEventListener('click', () => {
  lang = 'fi';
  document.getElementById('lang-fi').className = 'btn btn-sm btn-primary';
  document.getElementById('lang-en').className = 'btn btn-sm btn-outline-secondary';
  render();
});
document.getElementById('lang-en').addEventListener('click', () => {
  lang = 'en';
  document.getElementById('lang-en').className = 'btn btn-sm btn-primary';
  document.getElementById('lang-fi').className = 'btn btn-sm btn-outline-secondary';
  render();
});
document.getElementById('doc-cv').addEventListener('click', () => {
  docType = 'cv';
  document.getElementById('doc-cv').className = 'btn btn-sm btn-primary';
  document.getElementById('doc-publist').className = 'btn btn-sm btn-outline-secondary';
  render();
});
document.getElementById('doc-publist').addEventListener('click', () => {
  docType = 'publist';
  document.getElementById('doc-publist').className = 'btn btn-sm btn-primary';
  document.getElementById('doc-cv').className = 'btn btn-sm btn-outline-secondary';
  render();
});
document.getElementById('print-btn').addEventListener('click', () => window.print());

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
