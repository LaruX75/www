    .sb-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; }
    .sb-item label { font-size: 11px; color: #444; cursor: pointer; line-height: 1.35; }
    .sb-item label.excluded { color: #bbb; text-decoration: line-through; }
    .sb-subsection { font-size: 11px; font-weight: 600; color: #555; margin: 6px 0 2px; }
    .year-range { display: flex; align-items: center; gap: 6px; padding: 6px 4px; }
    .year-range input { width: 64px; font-size: 12px; }
    .sb-select-all { font-size: 11px; color: #0d6efd; cursor: pointer; padding: 2px 0 6px; display: block; }

    .doc-title { font-size: 15pt; font-weight: bold; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1px; font-family: system-ui, sans-serif; }

    .compact .doc-subtitle { font-size: 7.5pt; margin-bottom: 14px; }

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function groupBy(arr, fn) {
  const m = new Map();
  for (const it of arr) { const k = fn(it); if (!m.has(k)) m.set(k,[]); m.get(k).push(it); }
  return m;
}
function catOf(typeCode) {
  if (!typeCode) return null;
  return typeCode[0]; // A, B, C, D, E, G
}
function getYearMin() {
  return Math.min(
    ...(exportData?.researchfiPublications || []).map(p => p.year || 9999),
    ...(exportData?.localPublications || []).map(p => p.year || 9999)
  );
}
function getYearMax() {
  return Math.max(
    ...(exportData?.researchfiPublications || []).map(p => p.year || 0),
    ...(exportData?.localPublications || []).map(p => p.year || 0)
  );
}

    (p.year || 0) >= yearFrom && (p.year || 9999) <= yearTo
  );
  const local = exportData.localPublications.filter(p =>
    (p.year || 0) >= yearFrom && (p.year || 9999) <= yearTo

  const lang = state.lang;
  let html = buildMetaToggles();

  const rfByType = groupBy(rf, p => p.typeCode || '');

  html += `

  for (const cat of PUBCAT_DEFS) {
    const isLocal = cat.local;
    // Count items in this category
    let catItems = [];
    if (isLocal) {
      catItems = localByType.get(cat.types[0]) || [];
    } else {
      for (const tc of cat.types) catItems = catItems.concat(rfByType.get(tc) || []);
    }
    const total = catItems.length;
    const excluded = catItems.filter((_,i) => {
      const key = isLocal ? `local:${exportData.localPublications.indexOf(catItems[i])}` : `rf:${exportData.researchfiPublications.indexOf(catItems[i])}`;
      return state.publist.excluded.has(key);
    }).length;
    const active = total - excluded;
    const catEnabled = state.catEnabled(cat.key);
    const label = lang==='fi' ? cat.labelFi : cat.labelEn;
    const collapseId = `cat-items-${cat.key}`;

    html += `
    <div class="sb-section">
      <div class="sb-section-head">
        <div class="form-check form-switch mb-0" style="flex:1">
          <input class="form-check-input" type="checkbox" role="switch"

        </div>

          <i class="bi bi-chevron-down"></i></button>` : ''}
      </div>`;

    if (total > 0) {
      html += `<div class="collapse" id="${collapseId}">
        <div class="sb-items-list">
          <a class="sb-select-all" data-select-all="${cat.key}" data-local="${isLocal?1:0}">
            ${lang==='fi'?'Valitse kaikki / poista kaikki':'Select all / deselect all'}

      if (!isLocal) {
        // Group by subtype
        for (const tc of cat.types) {
          const items = rfByType.get(tc) || [];
          if (!items.length) continue;
          html += `<div class="sb-subsection">${esc(tc)}</div>`;
          items.forEach((p, _) => {
            const globalIdx = exportData.researchfiPublications.indexOf(p);
            const id = `rf:${globalIdx}`;
            const isExcluded = state.publist.excluded.has(id);
            const shortTitle = (p.title||'').slice(0,60) + ((p.title||'').length>60?'…':'');
            html += `<div class="sb-item">

      } else {

          const isExcluded = state.publist.excluded.has(id);
          const shortTitle = (p.title||'').slice(0,60) + ((p.title||'').length>60?'…':'');

          </div>`;
        });
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  return html;
}

function renderRef(p, showType=true) {
  const parts = [];
  if (p.authors) parts.push(`<span>${esc(p.authors)}.</span>`);
  if (p.year)    parts.push(`(${esc(p.year)}).`);
  if (p.title)   parts.push(`<span class="ref-title">${esc(p.title)}.</span>`);
  let venue = '';
  if (p.journal) { venue += esc(p.journal); if (p.volume) { venue += `, ${esc(p.volume)}`; if (p.issue) venue += `(${esc(p.issue)})`; } if (p.pages) venue += `, ${esc(p.pages)}`; }
  else if (p.publisher) venue = esc(p.publisher);
  if (venue) parts.push(`<span>${venue}.</span>`);
  const badges = [];
  if (showType && p.typeCode) badges.push(`<span class="ref-type">[${esc(p.typeCode)}]</span>`);
  if (state.showJufo && p.jufoLevel!=null) badges.push(`<span class="jufo-badge">Jufo ${esc(p.jufoLevel)}</span>`);
  if (state.showOA   && p.openAccess)      badges.push(`<span class="oa-badge">OA</span>`);
  const doi = p.doiUrl ? `<span class="ref-doi"><a href="${esc(p.doiUrl)}">${esc(p.doiUrl)}</a></span>` : '';
  return `<div class="doc-ref">${parts.join(' ')} ${doi} ${badges.join(' ')}</div>`;
}

function renderLocalRef(p) {
  const yr = p.year || (p.date?p.date.slice(0,4):'');
  const parts = [`<span>Laru, J.</span>`];
  if (yr) parts.push(`(${esc(yr)}).`);
  if (p.title) parts.push(`<span class="ref-title">${esc(p.title)}.</span>`);
  if (p.publication) parts.push(`<span>${esc(p.publication)}.</span>`);
  if (p.event) parts.push(`<span>${esc(p.event)}.</span>`);
  const doi = p.url ? `<span class="ref-doi"><a href="${esc(p.url)}">${esc(p.url)}</a></span>` : '';
  return `<div class="doc-ref">${parts.join(' ')} ${doi}</div>`;
}

function renderPublistCompact() {
  const s = S[state.lang];
  const { rf, local } = getFilteredPubs();
  const now = new Date().toLocaleDateString(state.lang==='fi'?'fi-FI':'en-GB',{day:'numeric',month:'long',year:'numeric'});

  const visibleRf = rf.filter(p => !state.publist.excluded.has(`rf:${exportData.researchfiPublications.indexOf(p)}`));
  const visibleLocal = local.filter(p => !state.publist.excluded.has(`local:${exportData.localPublications.indexOf(p)}`));

  const catDefs = [
    { key:'A', label: state.lang==='fi'?'A — Vertaisarvioidut':'A — Peer-reviewed',           types:['A1','A2','A3','A4'] },
    { key:'B', label: state.lang==='fi'?'B — Vertaisarvioimattomat':'B — Non-peer-reviewed',   types:['B1','B2','B3'] },
    { key:'C', label: state.lang==='fi'?'C — Tieteelliset kirjat':'C — Scientific books',      types:['C1','C2'] },
    { key:'D', label: state.lang==='fi'?'D — Ammatilliset':'D — Professional',                 types:['D1','D2','D3'] },
    { key:'E', label: state.lang==='fi'?'E — Yleistajuiset':'E — Popular science',             types:['E1','E2'] },
    { key:'G', label: state.lang==='fi'?'G — Väitöskirjat':'G — Doctoral theses',              types:['G4','G5'] },
    { key:'mielipide', label: s.sec_mielipide, types:['mielipide'], local:true },
    { key:'kolumni',   label: s.sec_kolumni,   types:['kolumni'],   local:true },
    { key:'puhe',      label: s.sec_puhe,       types:['puhe'],      local:true },
    { key:'esitelma',  label: s.sec_esitelma,   types:['esitelma'],  local:true },
  ];

  // Summary table rows
  const tableRows = catDefs.map(cat => {
    if (!state.catEnabled(cat.key)) return null;

      ? visibleLocal.filter(p => cat.types.includes(p.type))
      : visibleRf.filter(p => cat.types.includes(p.typeCode));
    if (!items.length) return null;
    const years = items.map(p=>p.year).filter(Boolean);
    const newest = years.length ? Math.max(...years) : '–';

    return `<tr><td><strong>${esc(cat.key.toUpperCase())}</strong></td><td>${esc(cat.label)}</td><td style="text-align:center">${items.length}</td><td style="text-align:center">${esc(oldest===newest?String(newest):`${oldest}–${newest}`)}</td></tr>`;
  }).filter(Boolean).join('');

  // Top A1/A2 publications for the "highlights" section (up to ~12)
  const highlights = visibleRf
    .filter(p => ['A1','A2','A3','A4'].includes(p.typeCode))
    .sort((a,b)=>(b.year||0)-(a.year||0))
    .slice(0, 12);

  return `

        <th style="width:70px;text-align:center">${state.lang==='fi'?'Vuodet':'Years'}</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
      <tfoot><tr style="font-weight:600"><td colspan="2">${esc(s.total)}</td><td style="text-align:center">${totalVis}</td><td></td></tr></tfoot>
    </table>
  </div>

  ${highlights.length ? `
  <div class="doc-section">
    <h2>${state.lang==='fi'?'Keskeisiä vertaisarvioituja julkaisuja (A)':'Selected peer-reviewed publications (A)'}</h2>

    <p><strong>${esc(cv.name)}</strong></p>
    <p>${esc(cv.position)}<br>${esc(cv.dept)}, ${esc(cv.institution)}</p>
    <p>${esc(cv.email)} &nbsp;|&nbsp; ORCID: <a href="https://orcid.org/0000-0003-0347-0182">0000-0003-0347-0182</a> &nbsp;|&nbsp; ResearcherID: H-3573-2013</p>
  </div>`;

  if (sec.education) html += `
  <div class="doc-section">
    <h2>${esc(s.education)}</h2>
    ${cv.education.map(e=>`<div class="doc-row"><div class="doc-year">${esc(e.year)}</div><div><strong>${esc(e.degree)}</strong>, ${esc(e.field)}, ${esc(e.institution)}${e.note?`<div class="doc-meta">${esc(e.note)}</div>`:''}</div></div>`).join('')}
  </div>`;

  if (sec.current_pos) html += `
  <div class="doc-section">
    <h2>${esc(s.current_pos)}</h2>
    ${cv.positions.map(p=>`<div class="doc-row"><div class="doc-year">${esc(p.period)}</div><div><strong>${esc(p.title)}</strong>${p.note?` — ${esc(p.note)}`:''}<div class="doc-meta">${esc(p.institution)}${p.dept?`, ${esc(p.dept)}`:''}</div></div></div>`).join('')}
  </div>`;

  if (sec.prev_pos) html += `
  <div class="doc-section">
    <h2>${esc(s.prev_pos)}</h2>
    ${cv.prev_positions.map(p=>`<div class="doc-row"><div class="doc-year">${esc(p.period)}</div><div><strong>${esc(p.title)}</strong>${p.note?` — ${esc(p.note)}`:''}<div class="doc-meta">${esc(p.institution)}</div></div></div>`).join('')}
  </div>`;

  if (sec.teaching) html += `
  <div class="doc-section">
    <h2>${esc(s.teaching)}</h2>
    <ul>${cv.teaching.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
  </div>`;

  if (sec.other_roles) html += `
  <div class="doc-section">
    <h2>${esc(s.other_roles)}</h2>
    ${cv.other_roles.map(r=>`<div class="doc-row"><div class="doc-year">${esc(r.period)}</div><div><strong>${esc(r.role)}</strong>${r.note?` — ${esc(r.note)}`:''}<div class="doc-meta">${esc(r.institution)}</div></div></div>`).join('')}
  </div>`;

  if (sec.funding) html += `
  <div class="doc-section">
    <h2>${esc(s.funding)}</h2>
    ${cv.funding.map(f=>`<div class="doc-row"><div class="doc-year">${esc(f.period)}</div><div><strong>${esc(f.project)}</strong>${f.role?` — ${esc(f.role)}`:''}<div class="doc-meta">${esc(f.funder)}</div></div></div>`).join('')}
  </div>`;

  if (sec.grants) html += `
  <div class="doc-section">
    <h2>${esc(s.grants)}</h2>
    ${cv.grants.map(g=>`<div class="doc-row"><div class="doc-year">${esc(g.year)}</div><div>${esc(g.funder)} &nbsp;<strong>${esc(g.amount)}</strong></div></div>`).join('')}
  </div>`;

  if (sec.pub_summary) {
    const recent = rf.slice(0,5);
    html += `
  <div class="doc-section">
    <h2>${esc(s.pub_summary)}</h2>
    <div class="stat-row">
      <div class="stat-item"><strong>${rf.length+local.length}</strong>${esc(s.publications)}</div>
      ${cA?`<div class="stat-item"><strong>${cA}</strong> A (${esc(s.peer_reviewed)})</div>`:''}
      ${cB?`<div class="stat-item"><strong>${cB}</strong> B</div>`:''}
      ${cC?`<div class="stat-item"><strong>${cC}</strong> C</div>`:''}
      ${cD?`<div class="stat-item"><strong>${cD}</strong> D</div>`:''}
      ${cE?`<div class="stat-item"><strong>${cE}</strong> E</div>`:''}
      ${cG?`<div class="stat-item"><strong>${cG}</strong> G</div>`:''}
      ${local.length?`<div class="stat-item"><strong>${local.length}</strong> ${state.lang==='fi'?'mielipide/kolumni/puhe':'opinion/column/speech'}</div>`:''}
    </div>
    ${recent.map(p=>renderRef(p)).join('')}
    <p class="doc-meta">${state.lang==='fi'?'Täydellinen julkaisuluettelo liitteenä (OKM).':'Full publication list attached (OKM).'}</p>
  </div>`;
  }

  if (sec.languages) html += `
  <div class="doc-section">
    <h2>${esc(s.languages)}</h2>
    <ul>${cv.languages.map(l=>`<li><strong>${esc(l.lang)}</strong>: ${esc(l.level)}</li>`).join('')}</ul>
  </div>`;

  if (sec.profiles) html += `
  <div class="doc-section">
    <h2>${esc(s.profiles)}</h2>
    <ul>${cv.profiles.map(p=>`<li><strong>${esc(p.name)}</strong>${p.id?`: ${esc(p.id)}`:''} ${p.url?`— <a href="${esc(p.url)}">${esc(p.url)}</a>`:''}</li>`).join('')}</ul>
  </div>`;

  return html;
}

function renderPublist() {
  if (state.compact) { document.getElementById('preview').classList.add('compact'); return renderPublistCompact(); }
  document.getElementById('preview').classList.remove('compact');
  const s = S[state.lang];
  const { rf, local } = getFilteredPubs();
  const now = new Date().toLocaleDateString(state.lang==='fi'?'fi-FI':'en-GB',{day:'numeric',month:'long',year:'numeric'});

  // Apply excluded set
  const visibleRf = rf.filter(p => {
    const idx = exportData.researchfiPublications.indexOf(p);
    return !state.publist.excluded.has(`rf:${idx}`);
  });
  const visibleLocal = local.filter(p => {
    const idx = exportData.localPublications.indexOf(p);
    return !state.publist.excluded.has(`local:${idx}`);
  });

  const rfByType = groupBy(visibleRf, p => p.typeCode || 'other');
  const localByType = groupBy(visibleLocal, p => p.type || 'other');
  for (const [,arr] of rfByType)    arr.sort((a,b)=>(b.year||0)-(a.year||0));
  for (const [,arr] of localByType) arr.sort((a,b)=>(b.year||0)-(a.year||0));

  function sectionBlock(heading, catKey, types, isLocal=false) {
    if (!state.catEnabled(catKey)) return '';
    const items = [];
    for (const tc of types) {
      const arr = (isLocal ? localByType : rfByType).get(tc);
      if (!arr?.length) continue;
      const label = isLocal ? (s[`sec_${tc}`]||tc) : (OKM_LABEL[state.lang][tc]||tc);
      items.push(`<div class="pub-type-label">${esc(label)} (${arr.length})</div>`);
      items.push(arr.map(p => isLocal ? renderLocalRef(p) : renderRef(p, false)).join(''));
    }
    if (!items.length) return '';
    return `<div class="pub-section-group"><div class="pub-section-head">${esc(heading)}</div>${items.join('')}</div>`;
  }

  const totalVisible = visibleRf.length + visibleLocal.length;
  const totalAll = (exportData?.researchfiPublications.length||0) + (exportData?.localPublications.length||0);

  return `
  <div class="doc-title">${esc(s.publist_title)}</div>
  <div class="doc-subtitle">${esc(s.publist_guideline)} &nbsp;·&nbsp; ${esc(s.generated)}: ${esc(now)}</div>
  <div class="doc-section" style="margin-bottom:10px">
    <div class="stat-row">
      <div class="stat-item"><strong>${totalVisible}</strong> ${esc(s.publications)}</div>
      <div class="stat-item" style="color:#888">(${esc(s.total)}: ${totalAll})</div>
    </div>
  </div>
  ${sectionBlock(s.sec_A,'A',['A1','A2','A3','A4'])}
  ${sectionBlock(s.sec_B,'B',['B1','B2','B3'])}
  ${sectionBlock(s.sec_C,'C',['C1','C2'])}
  ${sectionBlock(s.sec_D,'D',['D1','D2','D3'])}
  ${sectionBlock(s.sec_E,'E',['E1','E2'])}
  ${sectionBlock(s.sec_G,'G',['G4','G5'])}
  ${sectionBlock(s.sec_mielipide,'mielipide',['mielipide'],true)}
  ${sectionBlock(s.sec_kolumni,'kolumni',['kolumni'],true)}
  ${sectionBlock(s.sec_puhe,'puhe',['puhe'],true)}
  ${sectionBlock(s.sec_esitelma,'esitelma',['esitelma'],true)}`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════════════ */
function renderAll() {
  if (!exportData) return;

  // Sidebar
  const sbEl = document.getElementById('sidebar-inner');
  sbEl.innerHTML = state.docType === 'cv' ? buildSidebarCV() : buildSidebarPublist();

  // Preview
  const inner = document.getElementById('preview-inner');
  inner.innerHTML = state.docType === 'cv' ? renderCV() : renderPublist();

  document.getElementById('print-btn').disabled = false;
  bindSidebarEvents();
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR EVENTS
═══════════════════════════════════════════════════════════════ */
function bindSidebarEvents() {
  // Compact toggle
  const tCompact = document.getElementById('toggle-compact');
  if (tCompact) tCompact.addEventListener('change', () => { state.compact = tCompact.checked; document.getElementById('preview-inner').innerHTML = state.docType==='cv' ? renderCV() : renderPublist(); });

  // Jufo / OA meta toggles
  const tJufo = document.getElementById('toggle-jufo');
  const tOA   = document.getElementById('toggle-oa');
  if (tJufo) tJufo.addEventListener('change', () => { state.showJufo = tJufo.checked; document.getElementById('preview-inner').innerHTML = state.docType==='cv' ? renderCV() : renderPublist(); });
  if (tOA)   tOA.addEventListener('change',   () => { state.showOA   = tOA.checked;   document.getElementById('preview-inner').innerHTML = state.docType==='cv' ? renderCV() : renderPublist(); });

  // CV section toggles
  document.querySelectorAll('[data-cv-section]').forEach(el => {
    el.addEventListener('change', () => {
      state.cv.sections[el.dataset.cvSection] = el.checked;
      document.getElementById('preview-inner').innerHTML = renderCV();
    });
  });

  // Category toggles
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('change', () => {
      state.publist.cats[el.dataset.cat] = el.checked;
      renderAll();
    });
  });

  // Individual pub checkboxes
  document.querySelectorAll('[data-pub-id]').forEach(el => {
    el.addEventListener('change', () => {
      const id = el.dataset.pubId;
      if (el.checked) state.publist.excluded.delete(id);
      else             state.publist.excluded.add(id);
      // Update label style without full re-render
      const lbl = el.nextElementSibling;
      if (lbl) lbl.className = el.checked ? '' : 'excluded';
      // Update count badge
      updateCountBadges();
      // Re-render preview only
      document.getElementById('preview-inner').innerHTML = renderPublist();
    });
  });

  // Year range
  const yFrom = document.getElementById('year-from');
  const yTo   = document.getElementById('year-to');
  if (yFrom) {
    let timer;
    const onChange = () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        state.publist.yearFrom = parseInt(yFrom.value,10) || 0;
        state.publist.yearTo   = parseInt(yTo.value,10)  || 9999;
        renderAll();
      }, 400);
    };
    yFrom.addEventListener('input', onChange);
    yTo.addEventListener('input', onChange);
  }

  // Select all / deselect all
  document.querySelectorAll('[data-select-all]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const catKey = el.dataset.selectAll;
      const isLocal = el.dataset.local === '1';
      const catDef = PUBCAT_DEFS.find(c => c.key === catKey);
      if (!catDef) return;

      let items = [];
      if (isLocal) {
        items = exportData.localPublications.filter(p => catDef.types.includes(p.type));
      } else {
        items = exportData.researchfiPublications.filter(p => catDef.types.includes(p.typeCode));
      }

      // Check if any are currently excluded — if so, select all; otherwise deselect all
      const anyExcluded = items.some(p => {
        const idx = isLocal ? exportData.localPublications.indexOf(p) : exportData.researchfiPublications.indexOf(p);
        return state.publist.excluded.has(`${isLocal?'local':'rf'}:${idx}`);
      });

      items.forEach(p => {
        const idx = isLocal ? exportData.localPublications.indexOf(p) : exportData.researchfiPublications.indexOf(p);
        const id = `${isLocal?'local':'rf'}:${idx}`;
        if (anyExcluded) state.publist.excluded.delete(id);
        else             state.publist.excluded.add(id);
      });
      renderAll();
    });
  });
}

function updateCountBadges() {
  for (const cat of PUBCAT_DEFS) {
    const { rf, local } = getFilteredPubs();
    const isLocal = cat.local;
    let catItems = [];
    if (isLocal) catItems = local.filter(p => cat.types.includes(p.type));
    else         catItems = rf.filter(p => cat.types.includes(p.typeCode));

    const excluded = catItems.filter(p => {
      const isL = cat.local;
      const idx = isL ? exportData.localPublications.indexOf(p) : exportData.researchfiPublications.indexOf(p);
      return state.publist.excluded.has(`${isL?'local':'rf'}:${idx}`);
    }).length;
    const enabled = state.catEnabled(cat.key);
    const el = document.querySelector(`#cat-${cat.key}`)?.closest('.sb-section')?.querySelector('.count-badge');
    if (el) el.textContent = `${enabled ? catItems.length - excluded : 0}/${catItems.length}`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   TOP CONTROLS
═══════════════════════════════════════════════════════════════ */
function setLang(l) {
  state.lang = l;
  document.getElementById('lang-fi').className = `btn btn-sm ${l==='fi'?'btn-primary':'btn-outline-secondary'}`;
  document.getElementById('lang-en').className = `btn btn-sm ${l==='en'?'btn-primary':'btn-outline-secondary'}`;
  renderAll();
}
function setDocType(t) {
  state.docType = t;
  document.getElementById('doc-cv').className     = `btn btn-sm ${t==='cv'?'btn-primary':'btn-outline-secondary'}`;
  document.getElementById('doc-publist').className = `btn btn-sm ${t==='publist'?'btn-primary':'btn-outline-secondary'}`;
  renderAll();
}

document.getElementById('lang-fi').addEventListener('click', () => setLang('fi'));
document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
document.getElementById('doc-cv').addEventListener('click', () => setDocType('cv'));
document.getElementById('doc-publist').addEventListener('click', () => setDocType('publist'));
document.getElementById('print-btn').addEventListener('click', () => window.print());

/* ═══════════════════════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════════════════════ */
function setStatus(msg, clearMs=0) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  if (clearMs) setTimeout(() => { if (el.textContent===msg) el.textContent=''; }, clearMs);
}

async function loadData() {
  setStatus(state.lang==='fi'?'Ladataan…':'Loading…');
  try {
    const r = await fetch('/api/export-data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    exportData = await r.json();
    const n = (exportData.researchfiPublications?.length||0) + (exportData.localPublications?.length||0);
    const yMin = getYearMin(), yMax = getYearMax();
    state.publist.yearFrom = yMin;
    state.publist.yearTo   = yMax;
    setStatus(`${n} julkaisua`, 4000);
    renderAll();
  } catch (err) {
    setStatus('Virhe: ' + err.message);
    document.getElementById('preview-inner').innerHTML =
      `<div class="loading-area text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${esc(err.message)}<br>
       <small class="text-muted">Buildaa sivusto ensin: <code>npm run build:no-og</code></small></div>`;
    document.getElementById('sidebar-inner').innerHTML =
      `<div class="p-3 text-danger small">Dataa ei voitu ladata.</div>`;
  }
}

loadData();
</script>
